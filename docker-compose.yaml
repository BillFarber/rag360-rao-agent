name: rao-rag360

services:
  agents:
    platform: linux/amd64
    build:
      context: .
      dockerfile: agents/Dockerfile
      args:
        ARAG_IMAGE: ghcr.io/nuclia/rao
    stdin_open: true
    tty: true
    ports:
      - "8088:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - DEV=true
      - LOG_LEVEL=INFO
      - WATCHFILES_FORCE_POLLING=true
    env_file:
      - .env.compose
      - .env.dev
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./agents/:/app/rag360/agents/
      - ./agents/config.yaml:/app/rag360/config.yaml
