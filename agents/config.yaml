rag360-agent:
  title: RAG360 Agent
  description: RAG360 agent for retrieving data from MarkLogic for RAG use cases.
  instructions: You are a helpful assistant.
  drivers: []
  rules:
    rules:
      - prompt: Be polite and concise.
  workflows:
    getRetrieveDefinition:
      name: RetrieveDefinition
      description: Retrieve a definition from MarkLogic.
      parameters: {}
      required: []
      preprocess: []
      context:
        - module: retrieve-definition
          id: retrieve-definition
          title: Retrieve Definition
          prune_context: false
      generation:
        - module: passthrough
      postprocess: []
    getRetrieve:
      name: Retrieve
      description: Retrieve documents from MarkLogic for a given query.
      parameters:
        retrieveQuery:
          type: string
          description: >
            JSON string to POST as the body to the MarkLogic /v1/retrieve endpoint.
            Fields:
              - "text" (string): The search query. IMPORTANT SEARCH BEHAVIOR:
                - Words are AND-ed by default. A query like "GLP-1 glucose mice" requires
                  ALL three words to appear — this is overly restrictive and will miss
                  most relevant documents.
                - Use " OR " between terms to broaden retrieval across synonyms and
                  concept variants. This is almost always what you want.
                - Best practice: build one OR-chain per concept (drug names, outcomes,
                  species, etc.) and call Retrieve multiple times — once per concept
                  group — then deduplicate URIs before calling Augment. 
                - "topk" (integer): Maximum number of results to return.
              - "labels" (object): Filter by corpus label using
                {"labelName": {"constraintValue": "MustHave"}} or "MustNotHave".
            CORRECT example (broad, OR-based):
              {"text": "GLP-1 OR liraglutide OR semaglutide OR glucagon-like peptide",
              "topk": 10, "labels": {"pubmed": {"constraintValue": "MustHave"}}}
            INCORRECT example (AND — too restrictive):
              {"text": "GLP-1 glucagon-like peptide glucose mice", "topk": 10, ...}
              ← This requires every word to appear; returns far fewer results.

      required:
        - retrieveQuery
      preprocess: []
      context:
        - module: retrieve
          id: retrieve
          title: Retrieve
          prune_context: false
      generation:
        - module: passthrough
      postprocess: []
    getAugment:
      name: Augment
      description: Augment (fetch full document content) from MarkLogic by document URIs.
      parameters:
        augmentRequest:
          type: string
          description: >
            JSON string specifying the documents to fetch from the MarkLogic /v1/augment endpoint.
            Fields: "URIs" (array of strings, document URIs to fetch — note uppercase URIs).
            Example: {"URIs": ["/medical/doc002.json", "/medical/doc039.json"]}
      required:
        - augmentRequest
      preprocess: []
      context:
        - module: augment
          id: augment
          title: Augment
          prune_context: false
      generation:
        - module: passthrough
      postprocess: []
