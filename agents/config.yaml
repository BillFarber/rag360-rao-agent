rag360-agent:
  title: RAG360 Agent
  description: RAG360 agent for retrieving data from MarkLogic for RAG use cases.
  instructions: You are a helpful assistant.
  drivers: []
  rules:
    rules:
      - prompt: Be polite and concise.
  workflows:
    getRetrieveDefinition:
      name: RetrieveDefinition
      description: Retrieve a definition from MarkLogic.
      parameters: {}
      required: []
      preprocess: []
      context:
        - module: retrieve-definition
          id: retrieve-definition
          title: Retrieve Definition
          prune_context: false
      generation:
        - module: passthrough
      postprocess: []
    getRetrieve:
      name: Retrieve
      description: Retrieve documents from MarkLogic for a given query.
      parameters:
        retrieveQuery:
          type: string
          description: >
            JSON string to POST as the body to the MarkLogic /v1/retrieve endpoint.
            Fields: "text" (string, words are AND-ed by default — use " OR " between
            terms for OR search), "topk" (integer, max results), "labels" (object,
            filter by label using {"labelName": {"constraintValue": "MustHave"}} or
            {"constraintValue": "MustNotHave"}).
            Example: {"text": "diabetes OR insulin", "topk": 10, "labels": {"pubmed": {"constraintValue": "MustHave"}}}
      required:
        - retrieveQuery
      preprocess: []
      context:
        - module: retrieve
          id: retrieve
          title: Retrieve
          prune_context: false
      generation:
        - module: passthrough
      postprocess: []
    getAugment:
      name: Augment
      description: Augment (fetch full document content) from MarkLogic by document URIs.
      parameters:
        augmentRequest:
          type: string
          description: >
            JSON string specifying the documents to fetch from the MarkLogic /v1/augment endpoint.
            Fields: "URIs" (array of strings, document URIs to fetch — note uppercase URIs).
            Example: {"URIs": ["/medical/doc002.json", "/medical/doc039.json"]}
      required:
        - augmentRequest
      preprocess: []
      context:
        - module: augment
          id: augment
          title: Augment
          prune_context: false
      generation:
        - module: passthrough
      postprocess: []
